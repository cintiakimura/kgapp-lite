<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KGAPP lite — Home</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/kg-theme.css"/>
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "on-surface": "#FFFFFF",
            "on-surface-variant": "rgba(255,255,255,0.72)",
            background: "#0A0F0A",
            primary: "#00c600",
          },
        },
      },
    };
  </script>
  <style>
    body {
      min-height: 100dvh;
      background-color: #0A0F0A;
    }
    .material-symbols-outlined {
      font-variation-settings: "FILL" 0, "wght" 300, "GRAD" 0, "opsz" 24;
    }
  </style>
</head>
<body class="bg-background text-on-surface font-thin antialiased flex flex-col min-h-[100dvh]">
  <header class="flex flex-col gap-4 sm:flex-row sm:justify-between sm:items-center w-full px-6 sm:px-10 lg:px-12 py-6 sm:py-8 shrink-0">
    <a href="landing.html" class="flex items-center gap-3 shrink-0 min-w-0" aria-label="KGAPP lite home">
      <img src="assets/kg-logo.png" alt="KG" width="32" height="32" class="kg-brand-logo"/>
      <span class="text-xl sm:text-2xl font-normal text-white tracking-tighter uppercase">KGAPP <span class="font-thin lowercase opacity-70">lite</span></span>
    </a>
    <div class="flex flex-col sm:flex-row sm:items-center gap-3 w-full sm:w-auto sm:justify-end">
      <input type="email" id="login-email" autocomplete="email" placeholder="Work email"
        class="w-full sm:w-56 sm:min-w-[14rem] bg-[#091F03] border border-[rgba(0,198,0,0.28)] rounded-[6px] px-3 py-2 text-sm text-on-surface font-thin placeholder:text-on-surface-variant/40 focus:border-primary focus:ring-0 focus:outline-none"/>
      <nav class="flex items-center gap-3 shrink-0">
        <button type="button" id="btn-login" class="inline-flex items-center justify-center border border-[#00C600] text-white bg-transparent px-4 sm:px-6 py-2 rounded-[6px] text-xs sm:text-sm font-thin tracking-wide uppercase hover:bg-[rgba(0,198,0,0.12)] transition-colors">
          Login
        </button>
        <a href="create-company.html" class="inline-flex items-center justify-center border border-[#00C600] text-white bg-transparent px-4 sm:px-6 py-2 rounded-[6px] text-xs sm:text-sm font-thin tracking-wide uppercase hover:bg-[rgba(0,198,0,0.12)] transition-colors">
          Sign Up
        </a>
      </nav>
    </div>
  </header>

  <main class="flex-1 flex flex-col justify-center px-6 sm:px-10 lg:px-12 w-full max-w-5xl mx-auto pb-16">
    <div class="space-y-5 sm:space-y-6">
      <h1 class="text-5xl sm:text-7xl lg:text-8xl xl:text-[7rem] leading-[0.95] font-normal tracking-tighter text-on-surface">
        KGAPP lite
      </h1>
      <div class="w-16 sm:w-24 h-px bg-primary"></div>
      <p class="text-on-surface-variant text-base sm:text-lg max-w-md leading-relaxed">
        The technical precision standard for high-performance simulation logic. Engineered for clarity, built for experts.
      </p>
    </div>
  </main>

  <div class="fixed bottom-0 right-0 p-8 sm:p-12 opacity-[0.08] pointer-events-none select-none" aria-hidden="true">
    <div class="grid grid-cols-4 gap-3 sm:gap-4">
      <div class="w-6 h-6 sm:w-8 sm:h-8 border border-primary"></div>
      <div class="w-6 h-6 sm:w-8 sm:h-8 border border-primary"></div>
      <div class="w-6 h-6 sm:w-8 sm:h-8 border border-primary"></div>
      <div class="w-6 h-6 sm:w-8 sm:h-8 border border-primary bg-primary"></div>
      <div class="w-6 h-6 sm:w-8 sm:h-8 border border-primary"></div>
      <div class="w-6 h-6 sm:w-8 sm:h-8 border border-primary"></div>
      <div class="w-6 h-6 sm:w-8 sm:h-8 border border-primary"></div>
      <div class="w-6 h-6 sm:w-8 sm:h-8 border border-primary"></div>
    </div>
  </div>
  <script src="js/role.js"></script>
  <script>
    (function () {
      var input = document.getElementById("login-email");
      var btn = document.getElementById("btn-login");
      try {
        var saved = sessionStorage.getItem("kgapp_user_email");
        if (saved) input.value = saved;
      } catch (e) {}
      btn.addEventListener("click", function () {
        var email = input.value.trim();
        if (!email) {
          input.focus();
          return;
        }
        if (window.KGAPP) window.KGAPP.applyRoleFromEmail(email);
        window.location.href = "company-dashboard.html";
      });
    })();
  </script>
</body>
</html>
